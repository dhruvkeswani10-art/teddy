<!DOCTYPE html>
<html>
<head>
  <title>Can I Hug You? 🧸</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      text-align: center;
      font-family: "Comic Sans MS", cursive;
      background: linear-gradient(to right, #ffd6e8, #ffeef7);
      overflow: hidden;
    }

    h1 {
      margin-top: 100px;
      font-size: 32px;
      color: #ff4d94;
    }

    .buttons {
      margin-top: 40px;
      position: relative;
    }

    button {
      padding: 12px 25px;
      font-size: 18px;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      margin: 10px;
      transition: 0.3s ease;
    }

    #yesBtn {
      background-color: #ff66b2;
      color: white;
    }

    #yesBtn:hover {
      background-color: #ff3385;
    }

    #noBtn {
      background-color: #cccccc;
      position: absolute;
    }

    #hugSection {
      display: none;
      margin-top: 40px;
    }

    #hugSection img {
      width: 300px;
      margin-top: 20px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      animation: pop 1s ease;
    }

    @keyframes pop {
      0% { transform: scale(0.5); }
      100% { transform: scale(1); }
    }

    .heart {
      position: absolute;
      font-size: 24px;
      animation: floatUp 4s linear infinite;
    }

    @keyframes floatUp {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-600px); opacity: 0; }
    }

    #typingText {
      font-size: 20px;
      color: #ff3385;
      margin-top: 15px;
      min-height: 30px;
    }
  </style>
</head>

<body>

  <h1>🧸 Can I Hug You? 💞</h1>

  <div class="buttons">
    <button id="yesBtn" onclick="showHug()">Yes 💖</button>
    <button id="noBtn" onmouseover="moveButton()">No 🙈</button>
  </div>

  <div id="hugSection">
    <h2>🤗💖</h2>
    <div id="typingText"></div>
    <img src="hug.png" alt="Teddy Hug">
  </div>

  <audio id="bgMusic" src="music.mp3"></audio>

  <script>
    function moveButton() {
      var button = document.getElementById("noBtn");
      var x = Math.random() * (window.innerWidth - 100);
      var y = Math.random() * (window.innerHeight - 50);
      button.style.left = x + "px";
      button.style.top = y + "px";
    }

    function showHug() {
      document.querySelector(".buttons").style.display = "none";
      document.getElementById("hugSection").style.display = "block";
      document.getElementById("bgMusic").play();
      createHearts();
      typeMessage();
    }

    function createHearts() {
      for (let i = 0; i < 25; i++) {
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "💗";
        heart.style.left = Math.random() * window.innerWidth + "px";
        heart.style.top = window.innerHeight + "px";
        heart.style.fontSize = (Math.random() * 20 + 20) + "px";
        heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
        document.body.appendChild(heart);

        setTimeout(() => {
          heart.remove();
        }, 4000);
      }
    }

    function typeMessage() {
      const text = "Sending you a warm virtual hug 💞 I was enchanted to meet you ✨🧸";
      let i = 0;
      const speed = 50;

      function typing() {
        if (i < text.length) {
          document.getElementById("typingText").innerHTML += text.charAt(i);
          i++;
          setTimeout(typing, speed);
        }
      }

      typing();
    }
  </script>

</body>
</html>
